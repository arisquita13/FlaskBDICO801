<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cinepolis{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" />
</head>
<body class="bg-gray-900 text-gray-100">
    <nav class="bg-gradient-to-r from-yellow-500 to-yellow-600 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-3xl font-bold text-white">Cinépolis</h1>
            <ul class="flex gap-6">
                <li><a href="/" class="text-white hover:text-gray-100">Inicio</a></li>
                <li><a href="/procesar" class="text-white hover:text-gray-100">Comprar</a></li>
            </ul>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
</body>
</html>
